name: Wheel

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyfits
        uses: actions/checkout@v4

      - name: Checkout libfits
        uses: actions/checkout@v4
        with:
          repository: davidtgillard/fits
          path: fits
          ref: libfits

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Build libfits and bundle
        run: |
          cd fits
          zig build -Doptimize=ReleaseSafe
          mkdir -p ../src/pyfits/_lib
          cp zig-out/lib/libfits.so ../src/pyfits/_lib/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel
        run: |
          uv build
          ls -la dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyfits-wheel
          path: dist/*.whl
