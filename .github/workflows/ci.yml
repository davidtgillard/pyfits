name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyfits
        uses: actions/checkout@v4

      - name: Checkout libfits
        uses: actions/checkout@v4
        with:
          repository: davidtgillard/fits
          path: fits
          # Pin to same repo; override with ref when publishing wheels
          ref: libfits

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Build and bundle libfits
        run: |
          cd fits
          zig build -Doptimize=ReleaseSafe
          mkdir -p ../src/pyfits/_lib
          cp zig-out/lib/libfits.so ../src/pyfits/_lib/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Pyright
        run: uv run basedpyright

      - name: Mypy
        run: uv run mypy

      - name: Pytest with coverage
        id: pytest
        run: uv run pytest

      - name: Coverage summary
        if: always() && steps.pytest.outcome != 'skipped'
        run: |
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path("coverage.xml")
          if not path.is_file():
              print("No coverage data available (coverage.xml missing).")
              sys.exit(0)

          root = ET.parse(path).getroot()
          lines_valid = int(float(root.get("lines-valid", 0)))
          lines_covered = int(float(root.get("lines-covered", 0)))
          branches_valid = int(float(root.get("branches-valid", 0)))
          branches_covered = int(float(root.get("branches-covered", 0)))
          line_pct = 100.0 * float(root.get("line-rate", 0))
          branch_pct = 100.0 * float(root.get("branch-rate", 0))
          print(f"Line coverage:   {lines_covered}/{lines_valid} ({line_pct:.1f}%)")
          if branches_valid:
              print(
                  f"Branch coverage: {branches_covered}/{branches_valid} "
                  f"({branch_pct:.1f}%)"
              )
          PY
          if [ -f .coverage ]; then
            uv run coverage json -o coverage.json
          fi

      - name: Upload coverage reports
        if: always() && steps.pytest.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
            htmlcov/
          retention-days: 14
          if-no-files-found: ignore

      - name: pip-audit
        run: uv run pip-audit --skip-editable
