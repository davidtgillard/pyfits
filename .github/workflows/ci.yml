name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyfits
        uses: actions/checkout@v4

      - name: Checkout libfits
        uses: actions/checkout@v4
        with:
          repository: davidtgillard/fits
          path: fits
          # Pin to same repo; override with ref when publishing wheels
          ref: libfits

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Build and bundle libfits
        run: |
          cd fits
          zig build -Doptimize=ReleaseSafe
          mkdir -p ../src/pyfits/_lib
          cp zig-out/lib/libfits.so ../src/pyfits/_lib/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: pip-audit
        run: uv run pip-audit
