name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyfits
        uses: actions/checkout@v4

      - name: Read libfits ref
        id: libfits
        run: echo "ref=$(grep '^libfits-ref=' .fits-lib-version | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Checkout libfits
        uses: actions/checkout@v4
        with:
          repository: davidtgillard/fits
          path: fits
          ref: ${{ steps.libfits.outputs.ref }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Build and bundle libfits
        run: |
          cd fits
          zig build -Doptimize=ReleaseSafe
          mkdir -p ../src/pyfits/_lib
          cp zig-out/lib/libfits.so ../src/pyfits/_lib/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install documentation dependencies
        run: uv sync --group docs

      - name: Build site
        run: uv run sphinx-build -b html -W -n docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
