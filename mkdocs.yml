site_name: pyfits
site_url: https://davidtgillard.github.io/pyfits/
repo_url: https://github.com/davidtgillard/pyfits
repo_name: davidtgillard/pyfits

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Usage: usage.md
  - Errors: errors.md
  - Threading: threading.md
  - API Reference:
    - Overview: api/index.md
    - Repo: api/repo.md
    - Models: api/models.md
    - Exceptions: api/exceptions.md
    - Schemas: api/schemas.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
